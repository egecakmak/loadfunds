spring.application.name=loadfunds
# Handy for dumping the database onto a file to inspect it.
#spring.datasource.url=jdbc:h2:file:./data/loadfunds

# Velocity limits
velocity.limits.daily-amount-cents=500000
velocity.limits.weekly-amount-cents=2000000
velocity.limits.daily-load-count=3

# Blocking resource limits. HTTP requests are synchronous, so fail bounded waits
# instead of occupying Tomcat workers indefinitely. The H2 session setting also
# covers lock contention in the customer upsert before the explicit row lock.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.validation-timeout=1000
spring.datasource.hikari.connection-init-sql=SET LOCK_TIMEOUT 3000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
# Required for Micrometer to publish tomcat.threads.* worker-pool gauges.
server.tomcat.mbeanregistry.enabled=true

# Logging
# Default everything to DEBUG. INFO carries the key business events (decisions,
# duplicates, run summaries); DEBUG carries the per-load mechanics.
logging.level.root=DEBUG

# Metrics / Actuator
# In-memory SimpleMeterRegistry (no external backend); read at /actuator/metrics.
# logfile + loggers back the dashboard's live log viewer and its level selector.
management.endpoints.web.exposure.include=health,info,metrics,loggers,logfile
management.endpoint.logfile.external-file=logs/loadfunds.log
management.endpoint.health.show-details=always
# Tag every meter with the application name.
management.metrics.tags.application=loadfunds
# Client-side percentiles + histogram for the decision timer.
management.metrics.distribution.percentiles-histogram.loadfunds.decide=true
management.metrics.distribution.percentiles.loadfunds.decide=0.5,0.95,0.99
# DB layer is also covered by Spring Data repository metrics
# (spring.data.repository.invocations, plus the @Timed loadfunds.customer.lock) and
# HikariCP metrics. hibernate.* query stats need generate_statistics + the
# hibernate-micrometer binder (on the classpath); this flag has some overhead.
spring.jpa.properties.hibernate.generate_statistics=true
